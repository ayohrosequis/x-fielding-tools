<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Fielding Quota Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--surface:#fff;--border:#e0e0e8;--text:#1a1a2e;--dim:#3a3a4e;--muted:#6b6b80;--faint:#a0a0b0;--accent:#5b63d3;--green:#16a34a;--amber:#d97706;--red:#dc2626}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;padding:24px 32px;line-height:1.5}
h1{font-size:24px;font-weight:700;letter-spacing:-.5px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.sub{font-size:13px;color:var(--muted);margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card-title-r{color:var(--accent);font-size:13px;font-weight:400}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.mc .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.mc .val{font-size:26px;font-weight:700;color:var(--accent)}
.mc .msub{font-size:12px;color:var(--muted);margin-top:2px}
.uz{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;margin-bottom:20px;transition:all .2s}
.uz.over{border-color:var(--accent);background:rgba(91,99,211,.04)}
.uz:hover{border-color:#bbb}
.uz input{display:none}
.uz b{color:var(--accent)}
.uz .hint{font-size:12px;color:var(--faint);margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;user-select:none}
.tab:hover{color:var(--dim);background:rgba(91,99,211,.06)}
.tab.on{background:var(--accent);color:#fff;font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:1100px){.g3{grid-template-columns:1fr 1fr}}
@media(max-width:800px){.g2,.g3{grid-template-columns:1fr}}
.sl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.sl:first-child{margin-top:0}
.d-ok{color:var(--muted)}.d-hi{color:var(--amber)}.d-lo{color:var(--red)}
.nb{margin-bottom:10px}
.nb-h{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
.nb-t{height:7px;background:#eee;border-radius:4px;overflow:hidden}
.nb-f{height:100%;border-radius:4px;transition:width .5s ease}
.empty{text-align:center;padding:60px 20px;color:var(--faint)}
.footer{text-align:center;font-size:11px;color:var(--faint);padding:20px 0}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:13px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const TRACKED=['CELL','LISTED','LANG','GENDER','AGE2','EDUC','PRESVOT3','QTGROUP','COMPCONG','DIALREG','COMPCD'];
const REF_L={GENDER:'Gender',AGE2:'Age',EDUC:'Education',PRESVOT3:'Vote Recall',LANG:'Language',QTGROUP:'Region',COMPCONG:'Comp/Non-Comp'};
const BCOLS=['Total','Male','Female','2024 Pres voted','Did not','Harris','Trump','CA','FL','TX','Mid-Atl','Midwest','Other reg','Southwest','Comp CD','Split A','Split B','Total unwt'];

const TARGETS={
  nTargets:{total:2000,regions:{
    'California - Competitive CD':230,'California - Non-Competitive':370,'Florida':225,'Mid-Atlantic':200,
    'Midwest':135,'Other region':200,'Southwest':160,'Texas - Competitive CD':230,'Texas - Non-Competitive CD':250}},
  allVoters:{label:'All Sample',bannerCol:'Total',quotas:{
    GENDER:{Male:45,Female:53},AGE2:{'18-29':24,'30-39':18,'40-49':15,'50-64':23,'65 and over':20},
    LANG:{English:90,Spanish:10},PRESVOT3:{'Kamala Harris':50,'Donald Trump':32,'(Did not vote in this race)':11}}},
  votersOnly:{label:'Voters Only',bannerCol:'2024 Pres voted',quotas:{
    GENDER:{Male:44,Female:54},AGE2:{'18-29':21,'30-39':18,'40-49':15,'50-64':24,'65 and over':21},
    PRESVOT3:{'Kamala Harris':59,'Donald Trump':37,'(Did not vote in this race)':0},EDUC:{'+H.S. or less':22,'Post H.S.':32,'College graduate':44}}},
  nonvotersOnly:{label:'Nonvoters Only',bannerCol:'Did not',quotas:{
    GENDER:{Male:52,Female:47},AGE2:{'18-29':46,'30-39':18,'40-49':12,'50-64':14,'65 and over':9},
    EDUC:{'+H.S. or less':47,'Post H.S.':31,'College graduate':20}}},
  florida:{label:'Florida',bannerCol:'FL',quotas:{
    GENDER:{Male:36,Female:61},AGE2:{'18-29':18,'30-39':22,'40-49':12,'50-64':25,'65 and over':22},
    EDUC:{'+H.S. or less':19,'Post H.S.':29,'College graduate':51},PRESVOT3:{'Kamala Harris':38,'Donald Trump':46,'(Did not vote in this race)':10},
    LANG:{English:78,Spanish:22}}},
  texas:{label:'Texas',bannerCol:'TX',quotas:{
    GENDER:{Male:49,Female:51},AGE2:{'18-29':18,'30-39':17,'40-49':16,'50-64':26,'65 and over':24},
    EDUC:{'+H.S. or less':23,'Post H.S.':33,'College graduate':42},PRESVOT3:{'Kamala Harris':50,'Donald Trump':35,'(Did not vote in this race)':10},
    LANG:{English:93,Spanish:7}}},
  california:{label:'California',bannerCol:'CA',quotas:{
    GENDER:{Male:47,Female:52},AGE2:{'18-29':25,'30-39':20,'40-49':17,'50-64':24,'65 and over':15},
    EDUC:{'+H.S. or less':25,'Post H.S.':35,'College graduate':39},PRESVOT3:{'Kamala Harris':52,'Donald Trump':29,'(Did not vote in this race)':10},
    LANG:{English:91,Spanish:9}}},
  midAtlantic:{label:'Mid-Atlantic',bannerCol:'Mid-Atl',quotas:{
    GENDER:{Male:44,Female:55},AGE2:{'18-29':33,'30-39':13,'40-49':19,'50-64':15,'65 and over':22},
    EDUC:{'+H.S. or less':33,'Post H.S.':28,'College graduate':37},PRESVOT3:{'Kamala Harris':58,'Donald Trump':26,'(Did not vote in this race)':13},
    LANG:{English:88,Spanish:12}}},
  southwest:{label:'Southwest',bannerCol:'Southwest',quotas:{
    GENDER:{Male:48,Female:48},AGE2:{'18-29':14,'30-39':11,'40-49':10,'50-64':29,'65 and over':35},
    EDUC:{'+H.S. or less':24,'Post H.S.':36,'College graduate':39},PRESVOT3:{'Kamala Harris':49,'Donald Trump':33,'(Did not vote in this race)':8},
    LANG:{English:99,Spanish:1}}},
  compCDs:{label:'Competitive CDs',bannerCol:'Comp CD',quotas:{
    GENDER:{Male:49,Female:50},AGE2:{'18-29':20,'30-39':14,'40-49':18,'50-64':27,'65 and over':22},
    LANG:{English:92,Spanish:8}}},
};

let current=null, tab='overview', editing=false, hidden={};

// === PARSER ===
function colPos(sep){const p=[];let i_=false,s=0;for(let i=0;i<sep.length;i++){if(sep[i]==='='&&!i_){i_=true;s=i}else if(sep[i]!=='='&&i_){p.push([s,i]);i_=false}}if(i_)p.push([s,sep.length]);return p}
function exVals(l,pos){return pos.map(([s,e])=>l.substring(s,Math.min(e,l.length)).trim())}
function pNum(s){if(!s||s==='-'||s==='')return null;return parseFloat(s.replace(/,/g,''))}

function parseFile(text){
  const D={date:null,time:null,tables:{}};
  const dm=text.match(/=== (\d{2}\/\d{2}) at (\d{2}:\d{2}) ===/);
  if(dm){D.date=dm[1];D.time=dm[2]}
  const blocks=text.split(/={50,}\nPage: (\d+)/);
  for(let i=1;i<blocks.length;i+=2){
    const lines=blocks[i+1].split('\n');
    let ref='';
    for(const l of lines){const m=l.match(/\(ref:([^)]+)\)/);if(m){ref=m[1].trim();break}}
    if(!TRACKED.includes(ref))continue;
    let cp=null,si=-1;
    for(let j=0;j<lines.length;j++){if(lines[j].match(/^\s+=+\s+=+/)){cp=colPos(lines[j]);si=j;break}}
    if(!cp||cp.length<18)continue;
    const T={totalN:[],rows:{}};let ft=false,cl=null;
    for(let j=si+1;j<lines.length;j++){
      const l=lines[j];
      if(l.trim()===''){cl=null;continue}
      if(l.match(/Total answering/)){T.totalN=exVals(l,cp).map(v=>pNum(v));ft=true;if(j+1<lines.length&&lines[j+1].match(/^\s+100\.0/))j++;continue}
      if(!ft)continue;
      if(l.match(/^\s+[\d.]+/)){if(cl&&T.rows[cl]&&!T.rows[cl].pcts){T.rows[cl].pcts=exVals(l,cp).map(v=>pNum(v))}continue}
      const lt=l.substring(0,cp[0][0]).trim();
      if(!lt){if(cl){const c=l.trim().split(/\s{2,}/)[0];if(c&&!c.match(/^[\d.]+$/)){const nl=cl+' '+c;T.rows[nl]=T.rows[cl];delete T.rows[cl];cl=nl}}continue}
      const vals=exVals(l,cp);
      if(vals.length>=18){
        const fv=pNum(vals[0]);
        if(cl&&fv!==null&&fv<101&&T.rows[cl]&&!T.rows[cl].pcts){
          const merged=cl+' '+lt.replace(/\s+/g,' ').trim();
          T.rows[merged]=T.rows[cl];delete T.rows[cl];
          T.rows[merged].pcts=vals.map(v=>pNum(v));cl=merged;
        }else{cl=lt.replace(/\s+/g,' ').trim();T.rows[cl]={ns:vals.map(v=>pNum(v))}}
      }
    }
    if(D.tables[ref]){if((T.totalN[0]||0)>(D.tables[ref].totalN[0]||0))D.tables[ref]=T}else D.tables[ref]=T;
  }
  return D;
}

function extractM(parsed){
  const m={date:parsed.date,time:parsed.time,totalN:0,bd:{}};
  for(const[ref,T]of Object.entries(parsed.tables)){
    m.bd[ref]={_tn:{}};
    BCOLS.forEach((c,i)=>{m.bd[ref]._tn[c]=T.totalN[i]});
    for(const[label,rd]of Object.entries(T.rows)){
      m.bd[ref][label]={};
      BCOLS.forEach((c,i)=>{m.bd[ref][label][c]={n:(rd.ns||[])[i],pct:(rd.pcts||[])[i]}});
    }
  }
  const gt=parsed.tables['GENDER']||parsed.tables['QTGROUP']||parsed.tables['DIALREG'];
  if(gt)m.totalN=gt.totalN[0]||0;
  // Alias fallbacks: DIALREG → QTGROUP, COMPCD → COMPCONG
  if(!m.bd.QTGROUP&&m.bd.DIALREG)m.bd.QTGROUP=m.bd.DIALREG;
  if(!m.bd.COMPCONG&&m.bd.COMPCD)m.bd.COMPCONG=m.bd.COMPCD;
  return m;
}

// === HELPERS ===
function gv(d,ref,lab,bc,f){try{return d.bd[ref][lab][bc][f]}catch(e){return null}}
function gvf(d,ref,lab,bc,f){const v=gv(d,ref,lab,bc,f);if(v!=null)return v;try{const px=lab.substring(0,15).toLowerCase();for(const[k,cd]of Object.entries(d.bd[ref])){if(k==='_tn')continue;if(k.toLowerCase().startsWith(px))return cd[bc]?.[f]??null}}catch(e){}return null}
function gtn(d,ref,bc){try{return d.bd[ref]._tn[bc]}catch(e){return null}}
function toast(m,t){const el=document.getElementById('toast');el.textContent=m;el.className='toast show '+t;setTimeout(()=>el.className='toast',3000)}

function matchRN(key,data){
  if(!data.bd.QTGROUP)return 0;
  const kn=key.toLowerCase().replace(/\s+/g,' ').trim();
  
  // Direct match first (works for QTGROUP format)
  for(const[l,cd]of Object.entries(data.bd.QTGROUP)){
    if(l==='_tn')continue;
    const ln=l.toLowerCase().replace(/\s+/g,' ').trim();
    if(ln===kn)return cd.Total?.n||0;
    if(kn.length>6&&ln.startsWith(kn.substring(0,Math.min(20,kn.length))))return cd.Total?.n||0;
    if(ln.length>6&&kn.startsWith(ln.substring(0,Math.min(20,ln.length))))return cd.Total?.n||0;
  }
  
  // DIALREG format: aggregate "Comp CD XX" + "Non Comp XX" for state/region targets
  // Map target names to DIALREG search patterns
  const dialregMap={
    'california - competitive cd':['comp cd ca'],
    'california - non-competitive':['non comp ca'],
    'florida':['comp cd fl','non comp fl'],
    'mid-atlantic':['comp cd midat','non comp midat'],
    'midwest':['comp cd mdwst','non comp mdwst'],
    'other region':['comp cd other','non comp other'],
    'southwest':['comp cd sw','non comp sw'],
    'texas - competitive cd':['comp cd tx'],
    'texas - non-competitive cd':['non comp tx'],
  };
  
  const patterns=dialregMap[kn];
  if(patterns){
    let sum=0;
    for(const[l,cd]of Object.entries(data.bd.QTGROUP)){
      if(l==='_tn')continue;
      const ln=l.toLowerCase().replace(/\s+/g,' ').trim();
      for(const p of patterns){
        if(ln===p||ln.startsWith(p)){sum+=(cd.Total?.n||0);break}
      }
    }
    return sum;
  }
  return 0;
}

// === UI ===
function pctRow(label,actual,target){
  const a=actual??null,r=a!=null?Math.round(a):null,diff=r!=null?r-target:null;
  const ds=diff!=null?(diff>=0?'+'+diff:''+diff):'';
  const offBy=diff!=null?Math.abs(diff):0;
  const bg=offBy<=1?'':'rgba('+(offBy<=3?'217,119,6':'220,38,38')+','+(offBy<=3?'.06':'.08')+')';
  const dc=offBy<=1?'color:var(--muted)':(offBy<=3?'color:var(--amber);font-weight:600':'color:var(--red);font-weight:600');
  return `<tr style="background:${bg}">
    <td style="padding:6px 10px;color:var(--dim)">${label}</td>
    <td style="padding:6px 10px;text-align:right;color:var(--muted)">${target}%</td>
    <td style="padding:6px 10px;text-align:right;font-weight:600">${a!=null?a.toFixed(1)+'%':'\u2014'}</td>
    <td style="padding:6px 10px;text-align:right;${dc}">${ds?ds+'pp':''}</td>
  </tr>`;
}
function nBar(cur,tgt,label){
  const pct=tgt>0?Math.min((cur/tgt)*100,100):0;
  return `<div class="nb"><div class="nb-h"><span style="color:var(--dim)">${label}</span>
    <span style="font-weight:600;color:${cur>=tgt?'var(--green)':'var(--text)'}">
      ${cur.toLocaleString()} / ${tgt.toLocaleString()} (${pct.toFixed(0)}%)</span>
  </div><div class="nb-t"><div class="nb-f" style="width:${pct}%;background:${cur>=tgt?'var(--green)':'var(--accent)'}"></div></div></div>`;
}
function renderQG(gk){
  const g=TARGETS[gk];if(!g||!g.quotas||!current)return '';
  const bc=g.bannerCol,tn=gtn(current,Object.keys(g.quotas)[0],bc);
  let h=`<div class="card-title"><span>${g.label}</span><span class="card-title-r">Banner: ${bc} ${tn?'(n='+tn.toLocaleString()+')':''}</span></div>`;
  h+=`<table style="width:100%;border-collapse:collapse;font-size:13px">
  <thead><tr style="border-bottom:1px solid var(--border)">
    <th style="padding:6px 10px;text-align:left;font-size:11px;font-weight:500;color:var(--faint)">Category</th>
    <th style="padding:6px 10px;text-align:right;font-size:11px;font-weight:500;color:var(--faint)">Target</th>
    <th style="padding:6px 10px;text-align:right;font-size:11px;font-weight:500;color:var(--faint)">Actual</th>
    <th style="padding:6px 10px;text-align:right;font-size:11px;font-weight:500;color:var(--faint)">Diff</th>
  </tr></thead>`;
  for(const[ref,cats]of Object.entries(g.quotas)){
    const activeCats=Object.entries(cats).filter(([,t])=>t!==0);
    if(!activeCats.length)continue;
    h+=`<tr><td colspan="4" style="padding:10px 10px 4px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)">${REF_L[ref]||ref}</td></tr>`;
    for(const[cat,tgt]of activeCats){
      h+=pctRow(cat,gvf(current,ref,cat,bc,'pct'),tgt);
    }
    if(ref==='PRESVOT3'){
      const hPct=gvf(current,'PRESVOT3','Kamala Harris',bc,'pct');
      const tPct=gvf(current,'PRESVOT3','Donald Trump',bc,'pct');
      if(hPct!=null&&tPct!=null&&(hPct+tPct)>0){
        const h2way=((hPct/(hPct+tPct))*100);
        const t2way=((tPct/(hPct+tPct))*100);
        h+=`<tr><td colspan="4" style="padding:8px 10px">
          <div style="padding:8px 12px;background:var(--bg);border-radius:6px;font-size:13px">
            <span style="font-weight:600;color:var(--dim)">Harris 2-way:</span>
            <span style="font-weight:700;color:var(--accent);margin-left:8px">${h2way.toFixed(1)}%</span>
            <span style="color:var(--muted);margin-left:4px">\u2013 ${t2way.toFixed(1)}%</span>
            <span style="color:var(--faint);margin-left:8px">(H+${(h2way-50).toFixed(1)})</span>
          </div>
        </td></tr>`;
      }
    }
  }
  h+=`</table>`;
  return h;
}

function handleFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    const m=extractM(parseFile(e.target.result));
    const nm=file.name.match(/NIGHT[_\s]*(\d+)/i);
    m.nightLabel=nm?'Night '+nm[1]:file.name.replace('.txt','');
    current=m;tab='overview';render();
    toast('\u2713 '+m.nightLabel+' \u2014 '+m.totalN.toLocaleString()+' interviews','success');
  };reader.readAsText(file);
}

function dlCSV(rows,filename){
  const csv=rows.map(r=>r.map(c=>String(c).includes(',')?'"'+c+'"':c).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=filename;a.click();
}

function exportTargets(){
  const rows=[['Group','Variable','Category','Target %']];
  // N targets
  rows.push(['N Targets','Total','Total',TARGETS.nTargets.total]);
  for(const[r,n]of Object.entries(TARGETS.nTargets.regions))rows.push(['N Targets','Region',r,n]);
  // Pct targets
  const groups=['allVoters','votersOnly','nonvotersOnly','florida','texas','california','midAtlantic','southwest','compCDs'];
  for(const gk of groups){
    const g=TARGETS[gk];if(!g)continue;
    for(const[ref,cats]of Object.entries(g.quotas)){
      for(const[cat,pct]of Object.entries(cats))rows.push([g.label+' ('+g.bannerCol+')',REF_L[ref]||ref,cat,pct]);
    }
  }
  dlCSV(rows,'quota-targets.csv');
  toast('Exported quota targets','success');
}

function exportData(){
  if(!current){toast('No data loaded','error');return}
  const rows=[['Group','Banner Column','Variable','Category','N','Actual %','Target %','Diff (pp)']];
  const groups=['allVoters','votersOnly','nonvotersOnly','florida','texas','california','midAtlantic','southwest','compCDs'];
  // N targets
  const nt=TARGETS.nTargets;
  rows.push(['N Targets','Total','Total','Total',current.totalN,'',nt.total,current.totalN-nt.total]);
  for(const[r,tgt]of Object.entries(nt.regions)){
    const n=matchRN(r,current);
    rows.push(['N Targets','Total','Region',r,n,'',tgt,n-tgt]);
  }
  // Pct groups
  for(const gk of groups){
    const g=TARGETS[gk];if(!g)continue;
    const bc=g.bannerCol;
    for(const[ref,cats]of Object.entries(g.quotas)){
      for(const[cat,tgt]of Object.entries(cats)){
        const actual=gvf(current,ref,cat,bc,'pct');
        const n=gvf(current,ref,cat,bc,'n');
        const diff=actual!=null?Math.round(actual)-tgt:'';
        rows.push([g.label,bc,REF_L[ref]||ref,cat,n||'',actual!=null?actual.toFixed(1):'',tgt,diff]);
      }
    }
  }
  const label=current.nightLabel||'data';
  dlCSV(rows,'quota-check-'+label.replace(/\s+/g,'_')+'.csv');
  toast('Exported quota data for '+label,'success');
}

function importTargets(file){
  const reader=new FileReader();
  reader.onload=function(e){
    const lines=e.target.result.trim().split('\n');
    if(lines.length<2){toast('Empty CSV','error');return}
    // Parse header
    const header=lines[0].split(',').map(s=>s.replace(/"/g,'').trim().toLowerCase());
    const gi=header.indexOf('group'),vi=header.indexOf('variable'),ci=header.indexOf('category'),ti=header.indexOf('target %');
    if(ti===-1){toast('CSV must have a "Target %" column','error');return}

    const groups=['allVoters','votersOnly','nonvotersOnly','florida','texas','california','midAtlantic','southwest','compCDs'];
    const labelToKey={};
    for(const gk of groups){const g=TARGETS[gk];if(g)labelToKey[g.label.toLowerCase()]=gk}

    let imported=0;
    for(let i=1;i<lines.length;i++){
      // Handle commas inside quotes
      const row=[];let cur='',inQ=false;
      for(const ch of lines[i]){
        if(ch==='"'){inQ=!inQ}else if(ch===','&&!inQ){row.push(cur.trim());cur=''}else cur+=ch;
      }
      row.push(cur.trim());

      const group=row[gi]||'',variable=row[vi]||'',category=row[ci]||'',target=parseFloat(row[ti])||0;

      // N targets
      if(group.toLowerCase()==='n targets'){
        if(category.toLowerCase()==='total'){TARGETS.nTargets.total=target}
        else{
          // Match region by name
          for(const rk of Object.keys(TARGETS.nTargets.regions)){
            if(rk.toLowerCase()===category.toLowerCase()){TARGETS.nTargets.regions[rk]=target;break}
          }
        }
        imported++;continue;
      }

      // Pct targets — match group by label (strip banner col in parens)
      const gLabel=group.replace(/\s*\(.*\)\s*/,'').toLowerCase().trim();
      const gk=labelToKey[gLabel];
      if(!gk)continue;
      const g=TARGETS[gk];

      // Find the ref and category
      for(const[ref,cats]of Object.entries(g.quotas)){
        const refLabel=(REF_L[ref]||ref).toLowerCase();
        if(variable.toLowerCase()===refLabel){
          for(const catKey of Object.keys(cats)){
            if(catKey.toLowerCase()===category.toLowerCase()){
              g.quotas[ref][catKey]=target;imported++;break;
            }
          }
          break;
        }
      }
    }
    render();
    toast('Imported '+imported+' targets from CSV','success');
  };
  reader.readAsText(file);
}

function renderEditPanel(){
  const nt=TARGETS.nTargets;
  const groups=['allVoters','votersOnly','nonvotersOnly','florida','texas','california','midAtlantic','southwest','compCDs'];
  let h=`<div class="card"><div class="card-title">N Targets</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:6px 20px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:12px;color:var(--muted);min-width:180px">Total interviews</span>
        <input type="number" value="${nt.total}" onchange="TARGETS.nTargets.total=parseInt(this.value)||0;render()" style="border:1px solid var(--border);border-radius:4px;padding:4px 8px;width:70px;font-size:12px;text-align:right;font-family:inherit">
      </div>
      ${Object.entries(nt.regions).map(([k,v])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:12px;color:var(--muted);min-width:180px">${k}</span>
        <input type="number" value="${v}" onchange="TARGETS.nTargets.regions['${k}']=parseInt(this.value)||0;render()" style="border:1px solid var(--border);border-radius:4px;padding:4px 8px;width:70px;font-size:12px;text-align:right;font-family:inherit">
      </div>`).join('')}
    </div></div>`;
  for(const gk of groups){
    const g=TARGETS[gk];if(!g)continue;
    const isHidden=hidden[gk];
    h+=`<div class="card" style="${isHidden?'opacity:.5':''}">
      <div class="card-title"><span>${g.label}</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="card-title-r">banner: ${g.bannerCol}</span>
          <button onclick="hidden['${gk}']=!hidden['${gk}'];render()" style="background:${isHidden?'var(--accent)':'#eee'};color:${isHidden?'#fff':'var(--muted)'};border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:inherit">${isHidden?'Show':'Hide'}</button>
        </div>
      </div>`;
    if(!isHidden){
      h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:4px 20px">`;
    for(const[ref,cats]of Object.entries(g.quotas)){
      for(const[cat,pct]of Object.entries(cats)){
        const esc=cat.replace(/'/g,"\\'");
        h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-size:12px;color:var(--muted);min-width:180px">${REF_L[ref]||ref}: ${cat}</span>
          <input type="number" step="0.1" value="${pct}" onchange="TARGETS['${gk}'].quotas['${ref}']['${esc}']=parseFloat(this.value)||0;render()" style="border:1px solid var(--border);border-radius:4px;padding:4px 8px;width:70px;font-size:12px;text-align:right;font-family:inherit"> %
        </div>`;
      }
    }
    h+=`</div></div>`;
    } else { h+=`</div>`; }
  }
  return h;
}

function render(){
  const nt=TARGETS.nTargets,tN=current?.totalN||0;
  let h=`<div class="header"><div><h1>Survey Fielding Quota Tracker</h1>
    <div class="sub">${current?current.nightLabel+' \u00b7 '+current.date+' at '+current.time+' \u00b7 '+tN.toLocaleString()+' interviews':'Upload a topline .txt to check quotas'}</div>
  </div>${current?'<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><button onclick="editing=!editing;render()" style="background:'+(editing?'var(--accent)':'var(--surface)')+';color:'+(editing?'#fff':'var(--muted)')+';border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-family:inherit">'+(editing?'Done':'Edit Targets')+'</button><button onclick="document.getElementById(\'tfi\').click()" style="background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-family:inherit">Import Targets</button><input type="file" id="tfi" accept=".csv" style="display:none" onchange="if(this.files[0])importTargets(this.files[0]);this.value=\'\'"><button onclick="exportTargets()" style="background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-family:inherit">Export Targets</button><button onclick="exportData()" style="background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-family:inherit">Export Data</button><button onclick="current=null;tab=\'overview\';editing=false;render()" style="background:var(--surface);color:var(--red);border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-family:inherit">Clear</button></div>':''}</div>`;

  if(editing){
    h+=renderEditPanel();
    h+='<div class="footer">Nothing stored \u00b7 Refresh to reset</div>';
    document.getElementById('app').innerHTML=h;return;
  }
  h+=`<div class="uz" id="dz" onclick="document.getElementById('fi').click()">
    <input type="file" id="fi" accept=".txt" onchange="onFile(event)">
    <div style="font-size:14px;color:var(--muted)"><b>Drop topline .txt here</b> or click to upload</div>
    <div class="hint">${current?'Upload a new file to replace \u00b7 Refresh page to clear':'Reads all banner columns for quota QC'}</div>
  </div>`;
  if(!current){
    h+=`<div class="empty"><div style="font-size:40px;margin-bottom:12px">\ud83d\udcca</div>
      <div style="font-size:16px">Upload a topline to check quotas</div></div>`;
    document.getElementById('app').innerHTML=h+'<div class="footer">Nothing stored \u00b7 Refresh to reset</div>';return;
  }
  if(hidden[tab]&&tab!=='overview'){tab='overview'}
  const compN=gv(current,'COMPCONG','Competitive','Total','n')||0;
  const spN=gv(current,'LANG','Spanish','Total','n');
  const hasLang=spN!=null;
  h+=`<div class="metrics">
    <div class="mc"><div class="label">Total N</div><div class="val">${tN.toLocaleString()}</div><div class="msub">of ${nt.total.toLocaleString()} target</div></div>
    <div class="mc"><div class="label">% Complete</div><div class="val" style="color:${tN>=nt.total?'var(--green)':'var(--amber)'}">${((tN/nt.total)*100).toFixed(1)}%</div><div class="msub">${Math.max(nt.total-tN,0).toLocaleString()} remaining</div></div>
    <div class="mc"><div class="label">Comp CDs</div><div class="val">${compN.toLocaleString()}</div><div class="msub">of ${(nt.regions['California - Competitive CD']||0)+(nt.regions['Texas - Competitive CD']||0)} target</div></div>
    ${hasLang?'<div class="mc"><div class="label">Spanish</div><div class="val">'+(spN||0).toLocaleString()+'</div><div class="msub">'+((tN?(((spN||0)/tN)*100).toFixed(1):'0'))+'% of total</div></div>':''}
  </div>`;
  const tabs=[{id:'overview',l:'Overview'},{id:'allVoters',l:'All Sample'},{id:'votersOnly',l:'Voters Only'},{id:'nonvotersOnly',l:'Nonvoters'},
    {id:'florida',l:'Florida'},{id:'texas',l:'Texas'},{id:'california',l:'California'},{id:'midAtlantic',l:'Mid-Atlantic'},
    {id:'southwest',l:'Southwest'},{id:'compCDs',l:'Comp CDs'}].filter(t=>t.id==='overview'||!hidden[t.id]);
  h+=`<div class="tabs">${tabs.map(t=>`<div class="tab ${tab===t.id?'on':''}" onclick="setTab('${t.id}')">${t.l}</div>`).join('')}</div>`;
  if(tab==='overview'){
    const bp=Math.min((tN/nt.total)*100,100);
    h+=`<div class="g2"><div class="card">
      <div class="card-title"><span>Overall Progress</span><span class="card-title-r">${tN.toLocaleString()} / ${nt.total.toLocaleString()}</span></div>
      <div style="height:14px;background:#eee;border-radius:7px;overflow:hidden;margin-bottom:18px"><div style="height:100%;width:${bp}%;background:${tN>=nt.total?'var(--green)':'var(--accent)'};border-radius:7px;transition:width .5s"></div></div>
      <div class="sl">Region N Targets</div>
      ${Object.entries(nt.regions).filter(([,t])=>t>0).map(([r,t])=>nBar(matchRN(r,current),t,r)).join('')}
    </div><div class="card"><div class="card-title">Quick Quota Check</div>${hidden.allVoters?'':renderQG('allVoters')}</div></div>
    <div class="g3">${hidden.votersOnly?'':'<div class="card">'+renderQG('votersOnly')+'</div>'}${hidden.nonvotersOnly?'':'<div class="card">'+renderQG('nonvotersOnly')+'</div>'}${hidden.compCDs?'':'<div class="card">'+renderQG('compCDs')+'</div>'}</div>`;
  }else h+=`<div class="card">${renderQG(tab)}</div>`;
  h+='<div class="footer">Nothing stored \u00b7 Refresh to reset</div>';
  document.getElementById('app').innerHTML=h;
}

function onFile(e){const f=e.target.files[0];if(f)handleFile(f);e.target.value=''}
function setTab(t){tab=t;render()}
document.addEventListener('DOMContentLoaded',()=>{render();
  document.addEventListener('dragover',e=>{e.preventDefault();const d=document.getElementById('dz');if(d)d.classList.add('over')});
  document.addEventListener('dragleave',e=>{const d=document.getElementById('dz');if(d&&!d.contains(e.relatedTarget))d.classList.remove('over')});
  document.addEventListener('drop',e=>{e.preventDefault();const d=document.getElementById('dz');if(d)d.classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.txt'))handleFile(f)});
});
</script>
</body>
</html>
