<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Fielding Quota Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f5f5f8;--surface:#ffffff;--border:#e2e2ea;--text:#1a1a2e;--dim:#3a3a4e;--muted:#6b6b80;--faint:#a0a0b0;--accent:#5b63d3;--green:#16a34a;--amber:#d97706;--red:#dc2626;--mono:'JetBrains Mono',monospace;--sans:'Outfit','Inter',sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:24px 28px;line-height:1.5}
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:12px}
  .htag{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:4px}
  h1{font-size:26px;font-weight:700;letter-spacing:-.5px}
  .hsub{font-size:13px;color:var(--muted);margin-top:4px}
  .hact{display:flex;gap:8px;flex-wrap:wrap}
  .btn{background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;transition:all .15s}
  .btn:hover{border-color:var(--accent);color:var(--dim)}
  .btn-a{background:var(--accent);color:#fff}
  .btn-d{color:var(--red)}.btn-d:hover{border-color:var(--red)}
  .uz{border:2px dashed var(--border);border-radius:10px;padding:20px 24px;text-align:center;cursor:pointer;margin-bottom:24px;transition:all .2s}
  .uz.over{border-color:var(--accent);background:rgba(129,140,248,.05)}
  .uz:hover{border-color:#3a3a48}
  .uz input{display:none}
  .uz-l{font-size:14px;color:var(--muted)}.uz-l span{color:var(--accent);font-weight:600}
  .uz-h{font-size:12px;color:var(--faint);margin-top:4px}
  .empty{text-align:center;padding:60px 20px;color:var(--faint)}
  .mr{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .mc{background:var(--surface);border-radius:10px;padding:18px 20px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .ml{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
  .mv{font-size:28px;font-weight:700}
  .ms{font-size:12px;color:var(--muted);margin-top:4px}
  .card{background:var(--surface);border-radius:10px;padding:20px;border:1px solid var(--border);margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .ct{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .ctr{color:var(--accent);font-family:var(--mono);font-size:13px;font-weight:400}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
  @media(max-width:1100px){.g3{grid-template-columns:1fr 1fr}}
  @media(max-width:800px){.g2,.g3{grid-template-columns:1fr}}
  .pi{margin-bottom:10px}
  .ph{display:flex;justify-content:space-between;margin-bottom:3px;font-size:13px}
  .pl{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%}
  .pv{font-weight:600;white-space:nowrap}
  .pp{color:var(--muted);margin-left:6px}
  .pt{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
  .pf{height:100%;border-radius:4px;transition:width .6s ease-out}
  .pf.ok{box-shadow:0 0 8px rgba(74,222,128,.4)}
  .bpt{height:16px;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
  .bpf{height:100%;border-radius:8px;transition:width .8s ease-out}
  .sl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;margin-top:14px}
  .sl:first-child{margin-top:0}
  .tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
  .tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;background:transparent;color:var(--muted);border:1px solid transparent;transition:all .15s;user-select:none}
  .tab:hover{color:var(--dim);background:rgba(129,140,248,.08)}
  .tab.on{background:var(--accent);color:#fff;font-weight:600}
  .ht{width:100%;border-collapse:collapse;font-size:13px;font-family:var(--mono)}
  .ht th{text-align:left;padding:8px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border)}
  .ht th.r{text-align:right}
  .ht td{padding:8px 12px;border-bottom:1px solid var(--border)}
  .ht td.r{text-align:right}
  .rr{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
  .rb{background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px}
  .rb:hover{border-color:var(--red);color:var(--red)}
  .qr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .qr label{font-size:12px;color:var(--muted);min-width:200px}
  .qi{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 8px;width:70px;font-size:12px;text-align:right}
  .qi:focus{outline:none;border-color:var(--accent)}
  .qg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:4px 24px}
  .pb{margin-bottom:10px}
  .pbh{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
  .pbl{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:45%}
  .pbv{display:flex;gap:10px;white-space:nowrap}
  .pba{font-weight:600}
  .pbt{color:var(--muted)}
  .pbk{height:8px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
  .pbf{height:100%;border-radius:4px;position:absolute;top:0;left:0}
  .pbm{position:absolute;top:-2px;width:2px;height:12px;background:var(--text);border-radius:1px;z-index:2;opacity:.5}
  .dp{color:var(--green)}.dn{color:var(--red)}.dok{color:var(--muted)}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:13px;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.12);transform:translateY(80px);opacity:0;transition:all .3s ease}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.success{border-color:var(--green)}
  .toast.error{border-color:var(--red)}
  .footer{text-align:center;font-size:11px;color:#b0b0c0;padding:16px 0}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const SK_H='eq26-hist-v2', SK_T='eq26-tgt-v2';
const TRACKED=['CELL','LISTED','LANG','GENDER','AGE2','EDUC','PRESVOT3','QTGROUP','COMPCONG'];
const REF_L={GENDER:'Gender',AGE2:'Age',EDUC:'Education',PRESVOT3:'Vote Recall',LANG:'Language',QTGROUP:'Region',COMPCONG:'Comp/Non-Comp',CELL:'Cell Phone',LISTED:'Listed/Not Listed'};
const REF_C={};
const BCOLS=['Total','Male','Female','2024 Pres voted','Did not','Harris','Trump','CA','FL','TX','Mid-Atl','Midwest','Other reg','Southwest','Comp CD','Split A','Split B','Total unwt'];

const DT={
  nTargets:{total:2000,regions:{'California - Competitive CD':230,'California - Non-Competitive':370,'Florida':225,'Mid-Atlantic':200,'Midwest':135,'Other region':200,'Southwest':160,'Texas - Competitive CD':230,'Texas - Non-Competitive CD':250}},
  allVoters:{label:'All Voters',bannerCol:'Total',quotas:{
    GENDER:{Male:45,Female:53},AGE2:{'18-29':24,'30-39':18,'40-49':15,'50-64':23,'65 and over':20},
    LANG:{English:90,Spanish:10},PRESVOT3:{'Kamala Harris':50,'Donald Trump':32,'(Did not vote in this race)':11}}},
  votersOnly:{label:'Voters Only',bannerCol:'2024 Pres voted',quotas:{
    GENDER:{Male:44,Female:54},AGE2:{'18-29':21,'30-39':18,'40-49':15,'50-64':24,'65 and over':21},
    PRESVOT3:{'Kamala Harris':59,'Donald Trump':37},EDUC:{'+H.S. or less':22,'Post H.S.':32,'College graduate':44}}},
  nonvotersOnly:{label:'Nonvoters Only',bannerCol:'Did not',quotas:{
    GENDER:{Male:52,Female:47},AGE2:{'18-29':46,'30-39':18,'40-49':12,'50-64':14,'65 and over':9},
    EDUC:{'+H.S. or less':47,'Post H.S.':31,'College graduate':20}}},
  florida:{label:'Florida',bannerCol:'FL',quotas:{
    GENDER:{Male:36,Female:61},AGE2:{'18-29':18,'30-39':22,'40-49':12,'50-64':25,'65 and over':22},
    EDUC:{'+H.S. or less':19,'Post H.S.':29,'College graduate':51},PRESVOT3:{'Kamala Harris':38,'Donald Trump':46},
    LANG:{English:78,Spanish:22}}},
  texas:{label:'Texas',bannerCol:'TX',quotas:{
    GENDER:{Male:49,Female:51},AGE2:{'18-29':18,'30-39':17,'40-49':16,'50-64':26,'65 and over':24},
    EDUC:{'+H.S. or less':23,'Post H.S.':33,'College graduate':42},PRESVOT3:{'Kamala Harris':50,'Donald Trump':35},
    LANG:{English:93,Spanish:7}}},
  california:{label:'California',bannerCol:'CA',quotas:{
    GENDER:{Male:47,Female:52},AGE2:{'18-29':25,'30-39':20,'40-49':17,'50-64':24,'65 and over':15},
    EDUC:{'+H.S. or less':25,'Post H.S.':35,'College graduate':39},PRESVOT3:{'Kamala Harris':52,'Donald Trump':29},
    LANG:{English:91,Spanish:9}}},
  midAtlantic:{label:'Mid-Atlantic',bannerCol:'Mid-Atl',quotas:{
    GENDER:{Male:44,Female:55},AGE2:{'18-29':33,'30-39':13,'40-49':19,'50-64':15,'65 and over':22},
    EDUC:{'+H.S. or less':33,'Post H.S.':28,'College graduate':37},PRESVOT3:{'Kamala Harris':58,'Donald Trump':26},
    LANG:{English:88,Spanish:12}}},
  southwest:{label:'Southwest',bannerCol:'Southwest',quotas:{
    GENDER:{Male:48,Female:48},AGE2:{'18-29':14,'30-39':11,'40-49':10,'50-64':29,'65 and over':35},
    EDUC:{'+H.S. or less':24,'Post H.S.':36,'College graduate':39},PRESVOT3:{'Kamala Harris':49,'Donald Trump':33},
    LANG:{English:99,Spanish:1}}},
  compCDs:{label:'Competitive CDs',bannerCol:'Comp CD',quotas:{
    GENDER:{Male:49,Female:50},AGE2:{'18-29':20,'30-39':14,'40-49':18,'50-64':27,'65 and over':22},
    LANG:{English:92,Spanish:8}}},
};

let S={history:[],current:null,targets:JSON.parse(JSON.stringify(DT)),tab:'overview',edit:false};

function load(){try{const h=localStorage.getItem(SK_H);if(h){S.history=JSON.parse(h);S.current=S.history[S.history.length-1]||null;}}catch(e){}try{const t=localStorage.getItem(SK_T);if(t)S.targets=JSON.parse(t);}catch(e){}}
function saveH(){localStorage.setItem(SK_H,JSON.stringify(S.history))}
function saveT(){localStorage.setItem(SK_T,JSON.stringify(S.targets))}

// === PARSER ===
function colPos(sep){const p=[];let in_=false,s=0;for(let i=0;i<sep.length;i++){if(sep[i]==='='&&!in_){in_=true;s=i}else if(sep[i]!=='='&&in_){p.push([s,i]);in_=false}}if(in_)p.push([s,sep.length]);return p}
function exVals(line,pos){return pos.map(([s,e])=>line.substring(s,Math.min(e,line.length)).trim())}
function pNum(s){if(!s||s==='-'||s==='')return null;return parseFloat(s.replace(/,/g,''))}

function parseFile(text){
  const D={date:null,time:null,tables:{}};
  const dm=text.match(/=== (\d{2}\/\d{2}) at (\d{2}:\d{2}) ===/);
  if(dm){D.date=dm[1];D.time=dm[2]}
  const blocks=text.split(/={50,}\nPage: (\d+)/);
  for(let i=1;i<blocks.length;i+=2){
    const content=blocks[i+1],lines=content.split('\n');
    let ref='';
    for(const l of lines){const m=l.match(/\(ref:([^)]+)\)/);if(m){ref=m[1].trim();break}}
    if(!TRACKED.includes(ref))continue;
    let cp=null,si=-1;
    for(let j=0;j<lines.length;j++){if(lines[j].match(/^\s+=+\s+=+/)){cp=colPos(lines[j]);si=j;break}}
    if(!cp||cp.length<18)continue;
    const T={totalN:[],rows:{}};let ft=false,cl=null;
    for(let j=si+1;j<lines.length;j++){
      const l=lines[j];
      if(l.trim()===''){cl=null;continue}
      if(l.match(/Total answering/)){T.totalN=exVals(l,cp).map(v=>pNum(v));ft=true;if(j+1<lines.length&&lines[j+1].match(/^\s+100\.0/))j++;continue}
      if(!ft)continue;
      if(l.match(/^\s+[\d.]+/)){if(cl&&T.rows[cl]&&!T.rows[cl].pcts){T.rows[cl].pcts=exVals(l,cp).map(v=>pNum(v))}continue}
      const lt=l.substring(0,cp[0][0]).trim();
      if(!lt){if(cl){const c=l.trim().split(/\s{2,}/)[0];if(c&&!c.match(/^[\d.]+$/)){const nl=cl+' '+c;T.rows[nl]=T.rows[cl];delete T.rows[cl];cl=nl}}continue}
      const vals=exVals(l,cp);
      if(vals.length>=18){
        // Check if this is a continuation of a multiline label (vals are all pcts, no large Ns)
        const firstVal=pNum(vals[0]);
        if(cl&&firstVal!==null&&firstVal<101&&T.rows[cl]&&!T.rows[cl].pcts){
          // Could be pct line for previous label disguised as new label
          // Check: does the label text + previous label look like a continuation?
          const merged=cl+' '+lt.replace(/\s+/g,' ').trim();
          // If previous row has Ns but no pcts yet, this is likely the pct line with a label continuation
          T.rows[merged]=T.rows[cl];delete T.rows[cl];
          T.rows[merged].pcts=vals.map(v=>pNum(v));cl=merged;
        } else {
          cl=lt.replace(/\s+/g,' ').trim();T.rows[cl]={ns:vals.map(v=>pNum(v))}
        }
      }
    }
    if(D.tables[ref]){if((T.totalN[0]||0)>(D.tables[ref].totalN[0]||0))D.tables[ref]=T}else D.tables[ref]=T;
  }
  return D;
}

function extractM(parsed){
  const m={date:parsed.date,time:parsed.time,totalN:0,bd:{}};
  for(const[ref,T]of Object.entries(parsed.tables)){
    m.bd[ref]={_tn:{}};
    BCOLS.forEach((c,i)=>{m.bd[ref]._tn[c]=T.totalN[i]});
    for(const[label,rd]of Object.entries(T.rows)){
      m.bd[ref][label]={};
      BCOLS.forEach((c,i)=>{m.bd[ref][label][c]={n:(rd.ns||[])[i],pct:(rd.pcts||[])[i]}});
    }
  }
  const gt=parsed.tables['GENDER']||parsed.tables['QTGROUP'];
  if(gt)m.totalN=gt.totalN[0]||0;
  return m;
}

// === FILE HANDLING ===
function handleFile(f){
  const r=new FileReader();
  r.onload=function(e){
    const p=parseFile(e.target.result),m=extractM(p);
    const nm=f.name.match(/NIGHT[_\s]*(\d+)/i);
    m.nightLabel=nm?'Night '+nm[1]:'Upload '+(S.history.length+1);
    m.fileName=f.name;
    if(S.history.some(h=>h.totalN===m.totalN&&h.date===m.date)){toast('Duplicate file. Skipping.','error');return}
    S.history.push(m);
    S.history.sort((a,b)=>{const an=parseInt((a.nightLabel||'').match(/\d+/)?.[0]||'0'),bn=parseInt((b.nightLabel||'').match(/\d+/)?.[0]||'0');return an-bn});
    S.current=S.history[S.history.length-1];
    saveH();render();
    toast('\u2713 Loaded '+m.nightLabel+' \u2014 '+m.totalN.toLocaleString()+' interviews','success');
  };r.readAsText(f);
}

function toast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+type;setTimeout(()=>{el.className='toast'},3000)}
function gv(d,ref,lab,bc,f){try{return d.bd[ref][lab][bc][f]}catch(e){return null}}
// Fuzzy lookup: tries exact match first, then partial match for multiline label issues
function gvf(d,ref,lab,bc,f){
  const v=gv(d,ref,lab,bc,f);
  if(v!=null)return v;
  // Try fuzzy: find a key that starts with the first 15 chars of lab
  try{
    const prefix=lab.substring(0,15).toLowerCase();
    for(const[k,cd]of Object.entries(d.bd[ref])){
      if(k==='_tn')continue;
      if(k.toLowerCase().startsWith(prefix))return cd[bc]?.[f]??null;
    }
  }catch(e){}
  return null;
}
function gtn(d,ref,bc){try{return d.bd[ref]._tn[bc]}catch(e){return null}}

// === UI COMPONENTS ===
function spark(data,w,h,color){
  if(!data||data.length<2)return '';
  const mx=Math.max(...data),mn=Math.min(...data,0),rng=mx-mn||1,st=w/(data.length-1);
  const pts=data.map((v,i)=>`${i*st},${h-((v-mn)/rng)*(h-4)-2}`).join(' ');
  const dots=data.map((v,i)=>{const cx=i*st,cy=h-((v-mn)/rng)*(h-4)-2;return `<circle cx="${cx}" cy="${cy}" r="2.5" fill="${color}" opacity="${i===data.length-1?1:.4}"/>`}).join('');
  return `<svg width="${w}" height="${h}" style="display:block"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
}

function pctBarHTML(label,actual,target,color){
  const a=actual??0,rounded=Math.round(a),diff=rounded-target,ds=diff>=0?'+'+diff:''+diff;
  const dc=Math.abs(diff)<=1?'dok':(diff>0?'dp':'dn');
  // Bar shows ratio of actual to target — 100% fill = on target
  const ratio=target>0?Math.min((a/target)*100,120):0;
  const onTarget=Math.abs(diff)<=1;
  const barColor=onTarget?'var(--green)':(diff>1?'var(--amber)':color);
  return `<div class="pb"><div class="pbh"><span class="pbl">${label}</span><div class="pbv">
    <span class="pba" style="color:${color}">${actual!=null?a.toFixed(1)+'%':'\u2014'}</span>
    <span class="pbt">tgt ${target}%</span>
    <span class="${dc}">${actual!=null?ds+'pp':''}</span>
  </div></div><div class="pbk">
    <div class="pbf" style="width:${Math.min(ratio,100)}%;background:${barColor};opacity:.6"></div>
  </div></div>`;
}

function nBarHTML(cur,tgt,label,color){
  const pct=tgt>0?Math.min((cur/tgt)*100,100):0,ok=cur>=tgt;
  return `<div class="pi"><div class="ph"><span class="pl">${label}</span>
    <span class="pv" style="color:${ok?'var(--green)':'var(--text)'}">${cur.toLocaleString()} / ${tgt.toLocaleString()}<span class="pp">(${pct.toFixed(0)}%)</span></span>
  </div><div class="pt"><div class="pf ${ok?'ok':''}" style="width:${pct}%;background:${ok?'var(--green)':color}"></div></div></div>`;
}

function matchRN(key,data){
  if(!data.bd.QTGROUP)return 0;
  const kn=key.toLowerCase().replace(/\s+/g,' ').trim();
  for(const[l,cd]of Object.entries(data.bd.QTGROUP)){
    if(l==='_tn')continue;
    const ln=l.toLowerCase().replace(/\s+/g,' ').trim();
    // Exact match first
    if(ln===kn) return cd.Total?.n||0;
    // Match on first significant words (handles merged multiline labels like "California - Competitive CD")
    if(kn.length>6 && ln.startsWith(kn.substring(0,Math.min(20,kn.length)))) return cd.Total?.n||0;
    if(ln.length>6 && kn.startsWith(ln.substring(0,Math.min(20,ln.length)))) return cd.Total?.n||0;
  }
  return 0;
}

// === RENDER QUOTA GROUP ===
function renderQG(gk,data,targets){
  const g=targets[gk];if(!g||!g.quotas)return '';
  const bc=g.bannerCol;
  const tn=gtn(data,Object.keys(g.quotas)[0],bc);
  let h=`<div class="ct"><span>${g.label}</span><span class="ctr">Banner: ${bc} ${tn?'(n='+tn.toLocaleString()+')':''}</span></div>`;
  for(const[ref,cats]of Object.entries(g.quotas)){
    if(!Object.keys(cats).length)continue;
    h+=`<div class="sl">${REF_L[ref]||ref}</div>`;
    for(const[cat,tgt]of Object.entries(cats)){
      h+=pctBarHTML(cat, gvf(data,ref,cat,bc,'pct'), tgt, REF_C[ref]||'var(--accent)');
    }
  }
  return h;
}

// === RENDER EDIT TARGETS ===
function renderEdit(){
  const t=S.targets;
  let h=`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent)">N Targets</div><div class="qg">
    <div class="qr"><label>Total interviews</label><input class="qi" type="number" value="${t.nTargets.total}" onchange="uNT('total',this.value)"></div>
    ${Object.entries(t.nTargets.regions).map(([k,v])=>`<div class="qr"><label>${k}</label><input class="qi" type="number" value="${v}" onchange="uNR('${k}',this.value)"></div>`).join('')}
  </div></div>`;
  const groups=['allVoters','votersOnly','nonvotersOnly','florida','texas','california','midAtlantic','southwest','compCDs'];
  for(const gk of groups){
    const g=t[gk];if(!g)continue;
    h+=`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent)">${g.label} <span style="color:var(--muted);font-weight:400;font-size:12px">(banner: ${g.bannerCol})</span></div><div class="qg">`;
    for(const[ref,cats]of Object.entries(g.quotas)){
      for(const[cat,pct]of Object.entries(cats)){
        const esc=cat.replace(/'/g,"\\'");
        h+=`<div class="qr"><label>${REF_L[ref]||ref}: ${cat}</label><input class="qi" type="number" step="0.1" value="${pct}" onchange="uPT('${gk}','${ref}','${esc}',this.value)"> %</div>`;
      }
    }
    h+=`</div></div>`;
  }
  return h;
}

// === MAIN RENDER ===
function render(){
  const{history:H,current:C,targets:T,tab,edit}=S;
  const tN=C?.totalN||0, nt=T.nTargets;
  const pc=((tN/nt.total)*100).toFixed(1);
  const nN=H.length;
  const apn=nN>1?Math.round((H[nN-1]?.totalN-(H[0]?.totalN||0))/(nN-1)):tN;
  const rem=Math.max(nt.total-tN,0);
  const ntg=apn>0?Math.ceil(rem/apn):'\u2014';

  let h=`<div class="header"><div><div class="htag">Survey Fielding</div><h1>Quota Tracker</h1>
    ${C?`<div class="hsub">Latest: ${C.nightLabel} \u00b7 ${C.date} at ${C.time}</div>`:''}
  </div><div class="hact">
    <button class="btn ${edit?'btn-a':''}" onclick="tgEdit()">${edit?'Done':'Edit Targets'}</button>
    <button class="btn" onclick="expCSV()">Export CSV</button>
    <button class="btn btn-d" onclick="resetAll()">Reset</button>
  </div></div>`;

  h+=`<div class="uz" id="dz" onclick="document.getElementById('fi').click()">
    <input type="file" id="fi" accept=".txt" onchange="onFS(event)">
    <div class="uz-l"><span>Drop topline .txt file here</span> or click to upload</div>
    <div class="uz-h">Parses standard topline format \u00b7 reads all banner columns for quota tracking</div>
  </div>`;

  if(edit){h+=renderEdit();h+='<div class="footer">Survey Fielding Quota Tracker \u00b7 Data saved in browser</div>';document.getElementById('app').innerHTML=h;return}

  if(!C){h+=`<div class="empty"><div style="font-size:40px;margin-bottom:12px">\ud83d\udcca</div>
    <div style="font-size:16px">Upload your first nightly topline to get started</div>
    <div style="font-size:13px;margin-top:8px;color:#444">Tracks % quotas across all banner columns: overall, voters, nonvoters, states, and competitive CDs.</div></div>`;
    document.getElementById('app').innerHTML=h;return}

  // Metrics
  const compN=gv(C,'COMPCONG','Competitive','Total','n')||0;
  const spN=gv(C,'LANG','Spanish','Total','n')||0;
  h+=`<div class="mr">
    <div class="mc"><div class="ml">Total N</div><div class="mv" style="color:var(--accent)">${tN.toLocaleString()}</div><div class="ms">of ${nt.total.toLocaleString()} target</div></div>
    <div class="mc"><div class="ml">% Complete</div><div class="mv" style="color:${tN>=nt.total?'var(--green)':'var(--amber)'}">${pc}%</div><div class="ms">${rem>0?rem.toLocaleString()+' remaining':'Target reached!'}</div></div>
    <div class="mc"><div class="ml">Nights</div><div class="mv" style="color:var(--accent)">${nN}</div><div class="ms">${rem>0?'~'+ntg+' nights to go':'Complete'}</div></div>
    <div class="mc"><div class="ml">Avg/Night</div><div class="mv" style="color:var(--accent)">${apn.toLocaleString()}</div><div class="ms">interviews per night</div></div>
    <div class="mc"><div class="ml">Comp CDs</div><div class="mv" style="color:var(--accent)">${compN.toLocaleString()}</div><div class="ms">of ${(nt.regions['California - Competitive CD']||0)+(nt.regions['Texas - Competitive CD']||0)} target</div></div>
    <div class="mc"><div class="ml">Spanish</div><div class="mv" style="color:var(--accent)">${spN.toLocaleString()}</div><div class="ms">${tN?((spN/tN)*100).toFixed(1):'0'}% of total</div></div>
  </div>`;

  // Tabs
  const tabs=[{id:'overview',l:'Overview'},{id:'allVoters',l:'All Voters'},{id:'votersOnly',l:'Voters Only'},{id:'nonvotersOnly',l:'Nonvoters'},
    {id:'florida',l:'Florida'},{id:'texas',l:'Texas'},{id:'california',l:'California'},{id:'midAtlantic',l:'Mid-Atlantic'},{id:'southwest',l:'Southwest'},
    {id:'compCDs',l:'Comp CDs'},{id:'history',l:'History'}];
  h+=`<div class="tabs">${tabs.map(t=>`<div class="tab ${tab===t.id?'on':''}" onclick="setTab('${t.id}')">${t.l}</div>`).join('')}</div>`;

  if(tab==='overview'){
    const bp=Math.min((tN/nt.total)*100,100);
    const bgr=tN>=nt.total?'var(--green)':'var(--accent)';
    h+=`<div class="g2"><div class="card"><div class="ct"><span>Overall Progress</span><span class="ctr">${tN.toLocaleString()} / ${nt.total.toLocaleString()}</span></div>
      <div class="bpt"><div class="bpf" style="width:${bp}%;background:${bgr}"></div></div>
      <div class="sl">Region N Targets</div>
      ${Object.entries(nt.regions).map(([r,t])=>nBarHTML(matchRN(r,C),t,r,'var(--accent)')).join('')}
    </div>`;
    h+=`<div class="card"><div class="ct">Nightly Trend</div>`;
    if(H.length>=2){
      h+=`<div class="spark-section"><div class="spark-label">Cumulative</div>${spark(H.map(x=>x.totalN),320,50,'#5b63d3')}</div>`;
      h+=`<div class="spark-section"><div class="spark-label">Per-Night Gain</div>${spark(H.map((x,i)=>i===0?x.totalN:x.totalN-H[i-1].totalN),320,50,'#16a34a')}</div>`;
      h+=`<div class="spark-section"><div class="spark-label">Competitive CDs</div>${spark(H.map(x=>gv(x,'COMPCONG','Competitive','Total','n')||0),320,50,'#5b63d3')}</div>`;
    }else h+=`<div style="color:var(--faint);font-size:13px;padding:20px">Upload 2+ nights to see trends</div>`;
    h+=`</div></div>`;

    // Quick snapshots
    h+=`<div class="g3">`;
    for(const gk of['allVoters','votersOnly','nonvotersOnly']){h+=`<div class="card">${renderQG(gk,C,T)}</div>`}
    h+=`</div>`;

  }else if(tab==='history'){
    h+=`<div class="card"><div class="ct"><span>Nightly History</span><span style="font-size:12px;color:var(--muted);font-weight:400">${nN} night${nN!==1?'s':''}</span></div>
      <div style="overflow-x:auto"><table class="ht"><thead><tr><th>Night</th><th class="r">Total N</th><th class="r">New</th><th class="r">% Quota</th><th class="r">Comp CDs</th><th class="r">Spanish</th><th class="r">Date</th></tr></thead><tbody>
      ${H.map((x,i)=>{const prev=i>0?H[i-1].totalN:0,nn=x.totalN-prev,pct=((x.totalN/nt.total)*100).toFixed(1);
        return `<tr><td style="color:var(--dim)">${x.nightLabel}</td><td class="r" style="color:var(--text);font-weight:600">${x.totalN.toLocaleString()}</td>
        <td class="r" style="color:${nn>0?'var(--green)':'var(--muted)'}">${nn>0?'+'+nn.toLocaleString():'\u2014'}</td>
        <td class="r" style="color:${x.totalN>=nt.total?'var(--green)':'var(--amber)'}">${pct}%</td>
        <td class="r" style="color:var(--dim)">${(gv(x,'COMPCONG','Competitive','Total','n')||0).toLocaleString()}</td>
        <td class="r" style="color:var(--dim)">${(gv(x,'LANG','Spanish','Total','n')||0).toLocaleString()}</td>
        <td class="r" style="color:var(--muted)">${x.date||'\u2014'}</td></tr>`}).join('')}
      </tbody></table></div>
      ${H.length>0?`<div class="rr">${H.map((x,i)=>`<button class="rb" onclick="rmN(${i})">✕ ${x.nightLabel}</button>`).join('')}</div>`:''}
    </div>`;
  }else{
    h+=`<div class="card">${renderQG(tab,C,T)}</div>`;
  }

  h+='<div class="footer">Survey Fielding Quota Tracker \u00b7 Data saved in browser localStorage</div>';
  document.getElementById('app').innerHTML=h;
}

// === HANDLERS ===
function onFS(e){const f=e.target.files[0];if(f)handleFile(f);e.target.value=''}
function setTab(t){S.tab=t;render()}
function tgEdit(){S.edit=!S.edit;render()}
function uNT(k,v){S.targets.nTargets[k]=parseInt(v)||0;saveT();render()}
function uNR(k,v){S.targets.nTargets.regions[k]=parseInt(v)||0;saveT();render()}
function uPT(g,ref,cat,v){S.targets[g].quotas[ref][cat]=parseFloat(v)||0;saveT();render()}
function rmN(i){S.history.splice(i,1);S.current=S.history.length>0?S.history[S.history.length-1]:null;saveH();render()}
function resetAll(){if(!confirm('Clear all fielding data? This cannot be undone.'))return;S.history=[];S.current=null;localStorage.removeItem(SK_H);localStorage.removeItem(SK_T);S.targets=JSON.parse(JSON.stringify(DT));saveH();render();toast('All data cleared.','error')}
function expCSV(){
  if(!S.history.length)return;
  const rows=[['Night','Date','Total N','New','Competitive','Spanish','% Complete']];
  S.history.forEach((h,i)=>{const prev=i>0?S.history[i-1].totalN:0;
    rows.push([h.nightLabel,h.date,h.totalN,h.totalN-prev,gv(h,'COMPCONG','Competitive','Total','n')||0,gv(h,'LANG','Spanish','Total','n')||0,((h.totalN/S.targets.nTargets.total)*100).toFixed(1)+'%'])});
  const b=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`eq26-tracker-${new Date().toISOString().split('T')[0]}.csv`;a.click();
}

// Drag & drop
document.addEventListener('DOMContentLoaded',()=>{
  load();render();
  document.addEventListener('dragover',e=>{e.preventDefault();const d=document.getElementById('dz');if(d)d.classList.add('over')});
  document.addEventListener('dragleave',e=>{const d=document.getElementById('dz');if(d&&!d.contains(e.relatedTarget))d.classList.remove('over')});
  document.addEventListener('drop',e=>{e.preventDefault();const d=document.getElementById('dz');if(d)d.classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.txt'))handleFile(f)});
});
</script>
</body>
